<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - My App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #1877f2, #0c5d9e);
      color: white;
      padding: 30px;
      text-align: center;
    }
    
    .header h2 {
      font-size: 28px;
    }
    
    .content {
      padding: 30px;
      text-align: center;
    }
    
    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #1877f2;
      margin-bottom: 20px;
      object-fit: cover;
    }
    
    h3 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    
    .info-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }
    
    .info-item {
      margin: 12px 0;
      padding: 8px;
      background: white;
      border-radius: 8px;
    }
    
    .info-label {
      font-weight: bold;
      color: #555;
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
    }
    
    .info-value {
      color: #333;
      word-break: break-all;
      font-size: 14px;
    }
    
    .logout-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }
    
    .logout-btn:hover {
      background: #c0392b;
      transform: translateY(-2px);
    }
    
    .hidden {
      display: none;
    }
    
    .loading-container {
      text-align: center;
      padding: 50px;
      background: white;
      border-radius: 20px;
      max-width: 500px;
      margin: 50px auto;
    }
    
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #1877f2;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .db-status {
      font-size: 12px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 5px;
    }
    
    .db-success {
      background: #e8f8f5;
      color: #27ae60;
    }
    
    .db-error {
      background: #fde8e8;
      color: #e74c3c;
    }
    
    .refresh-btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 12px;
    }
    
    .refresh-btn:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>
  <div id="loading-container" class="loading-container">
    <div class="loader"></div>
    <p>Loading your profile from database...</p>
  </div>
  
  <div id="dashboard" class="container hidden">
    <div class="header">
      <h2>🎯 Dashboard</h2>
      <p>Welcome back!</p>
    </div>
    <div class="content">
      <img id="profile-pic" class="profile-img" src="" alt="Profile Picture">
      <h3 id="user-name"></h3>
      
      <div class="info-card">
        <div class="info-item">
          <span class="info-label">🔑 User ID</span>
          <span class="info-value" id="user-uid"></span>
        </div>
        <div class="info-item">
          <span class="info-label">📧 Email Address</span>
          <span class="info-value" id="user-email"></span>
        </div>
        <div class="info-item">
          <span class="info-label">📅 Account Created</span>
          <span class="info-value" id="created-at"></span>
        </div>
        <div class="info-item">
          <span class="info-label">🕐 Last Login</span>
          <span class="info-value" id="last-login"></span>
        </div>
        <div class="info-item">
          <span class="info-label">💾 Data Source</span>
          <span class="info-value" id="data-source"></span>
        </div>
      </div>
      
      <div id="db-status" class="db-status"></div>
      <button id="refresh-btn" class="refresh-btn">🔄 Refresh Data</button>
      <button id="logout-btn" class="logout-btn" style="margin-top: 10px;">🚪 Logout</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBB3RRMw0MinDO1MPd2D6Ud-QAew-1ckzY",
      authDomain: "mywebsite-852ab.firebaseapp.com",
      projectId: "mywebsite-852ab",
      storageBucket: "mywebsite-852ab.firebasestorage.app",
      messagingSenderId: "300123917348",
      appId: "1:300123917348:web:53a1c10b54a8928a8a9cb1",
      measurementId: "G-C14SR2RZWS"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loadingDiv = document.getElementById('loading-container');
    const dashboard = document.getElementById('dashboard');
    const profilePic = document.getElementById('profile-pic');
    const userName = document.getElementById('user-name');
    const userUid = document.getElementById('user-uid');
    const userEmail = document.getElementById('user-email');
    const createdAtSpan = document.getElementById('created-at');
    const lastLoginSpan = document.getElementById('last-login');
    const dataSourceSpan = document.getElementById('data-source');
    const dbStatus = document.getElementById('db-status');
    const refreshBtn = document.getElementById('refresh-btn');
    const logoutBtn = document.getElementById('logout-btn');

    // Function to load user data from Firestore
    async function loadUserData(uid) {
      try {
        console.log('Fetching user data from Firestore for UID:', uid);
        const userRef = doc(db, "users", uid);
        const userDoc = await getDoc(userRef);
        
        if (userDoc.exists()) {
          const data = userDoc.data();
          console.log('✅ User data found in Firestore:', data);
          return data;
        } else {
          console.log('⚠️ No user document found in Firestore');
          return null;
        }
      } catch (error) {
        console.error('❌ Error loading user data:', error);
        return null;
      }
    }

    // Function to update last login
    async function updateLastLogin(uid) {
      try {
        const userRef = doc(db, "users", uid);
        await updateDoc(userRef, {
          lastLogin: new Date().toISOString()
        });
        console.log('✅ Last login updated');
        return true;
      } catch (error) {
        console.error('Error updating last login:', error);
        return false;
      }
    }

    // Function to display user data
    function displayUserData(user, dbData) {
      // Basic user info from Auth
      profilePic.src = user.photoURL || `https://ui-avatars.com/api/?background=1877f2&color=fff&name=${encodeURIComponent(user.displayName || 'User')}`;
      userName.textContent = user.displayName || 'Facebook User';
      userUid.textContent = user.uid;
      userEmail.textContent = user.email || 'Not provided';
      
      // Database info
      if (dbData) {
        if (dbData.createdAt) {
          const createdDate = new Date(dbData.createdAt);
          createdAtSpan.textContent = createdDate.toLocaleString();
        } else {
          createdAtSpan.textContent = 'Not available';
        }
        
        if (dbData.lastLogin) {
          const lastLoginDate = new Date(dbData.lastLogin);
          lastLoginSpan.textContent = lastLoginDate.toLocaleString();
        } else {
          lastLoginSpan.textContent = 'Just now';
        }
        
        dataSourceSpan.textContent = '✅ Firestore Database';
        dbStatus.textContent = '✅ Data loaded from Firestore successfully!';
        dbStatus.className = 'db-status db-success';
      } else {
        createdAtSpan.textContent = 'Not in database';
        lastLoginSpan.textContent = 'Run login again';
        dataSourceSpan.textContent = '⚠️ Local only (not in DB)';
        dbStatus.textContent = '⚠️ User data not found in Firestore. Please login again.';
        dbStatus.className = 'db-status db-error';
      }
    }

    // Main auth state handler
    onAuthStateChanged(auth, async (user) => {
      console.log("Auth state changed:", user ? `User: ${user.uid}` : "No user");
      
      if (user) {
        try {
          // Update last login
          await updateLastLogin(user.uid);
          
          // Load data from database
          const dbData = await loadUserData(user.uid);
          
          // Display all data
          displayUserData(user, dbData);
          
          // Show dashboard
          loadingDiv.classList.add('hidden');
          dashboard.classList.remove('hidden');
          
        } catch (error) {
          console.error("Error in dashboard:", error);
          // Still show basic info even if DB fails
          displayUserData(user, null);
          loadingDiv.classList.add('hidden');
          dashboard.classList.remove('hidden');
        }
      } else {
        // No user - redirect to login
        console.log("No user found, redirecting to index.html");
        window.location.href = 'index.html';
      }
    });

    // Refresh data button
    refreshBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (user) {
        refreshBtn.disabled = true;
        refreshBtn.textContent = 'Loading...';
        
        const dbData = await loadUserData(user.uid);
        displayUserData(user, dbData);
        
        refreshBtn.disabled = false;
        refreshBtn.textContent = '🔄 Refresh Data';
      }
    });

    // Logout function
    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
        console.log("User logged out");
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Logout error:', error);
        alert('Error logging out: ' + error.message);
      }
    });
  </script>
</body>
</html>
