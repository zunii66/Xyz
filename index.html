<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Login - My App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 400px;
      width: 90%;
    }
    
    h2 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    p {
      color: #666;
      margin-bottom: 25px;
    }
    
    .facebook-btn {
      background: #1877f2;
      color: white;
      border: none;
      padding: 14px 35px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .facebook-btn:hover:not(:disabled) {
      background: #166fe5;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(24,119,242,0.3);
    }
    
    .facebook-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .error {
      color: #e74c3c;
      margin-top: 15px;
      font-size: 14px;
      display: none;
      background: #fde8e8;
      padding: 10px;
      border-radius: 8px;
    }
    
    .loading {
      display: none;
      margin-top: 15px;
      color: #666;
    }
    
    .success {
      color: #27ae60;
      margin-top: 15px;
      font-size: 14px;
      display: none;
      background: #e8f8f5;
      padding: 10px;
      border-radius: 8px;
    }
    
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #1877f2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🚀 Welcome to My App</h2>
    <p>Please login with Facebook to continue</p>
    <button class="facebook-btn" id="facebook-login-btn">
      <span>📘</span> Login with Facebook
    </button>
    <div id="error-msg" class="error"></div>
    <div id="success-msg" class="success"></div>
    <div id="loading" class="loading">
      <div class="spinner"></div> Processing login...
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithPopup, FacebookAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBB3RRMw0MinDO1MPd2D6Ud-QAew-1ckzY",
      authDomain: "mywebsite-852ab.firebaseapp.com",
      projectId: "mywebsite-852ab",
      storageBucket: "mywebsite-852ab.firebasestorage.app",
      messagingSenderId: "300123917348",
      appId: "1:300123917348:web:53a1c10b54a8928a8a9cb1",
      measurementId: "G-C14SR2RZWS"
    };
    
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new FacebookAuthProvider();
    
    provider.addScope('email');
    provider.addScope('public_profile');

    const loginBtn = document.getElementById('facebook-login-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const loadingDiv = document.getElementById('loading');

    // Function to save user data to Firestore
    async function saveUserToDatabase(user) {
      if (!user) {
        console.log('No user provided to save');
        return false;
      }
      
      try {
        console.log('Saving user to database:', user.uid);
        
        const userRef = doc(db, "users", user.uid);
        const userData = {
          uid: user.uid,
          name: user.displayName || 'Facebook User',
          email: user.email || '',
          photoURL: user.photoURL || '',
          provider: 'facebook',
          lastLogin: new Date().toISOString(),
          createdAt: new Date().toISOString(),
          status: 'active',
          timestamp: serverTimestamp()
        };
        
        await setDoc(userRef, userData, { merge: true });
        console.log('✅ User data successfully saved to Firestore!');
        return true;
        
      } catch (error) {
        console.error('❌ Error saving user to database:', error);
        console.error('Error details:', error.message);
        return false;
      }
    }

    // Check if user is already logged in
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        console.log('User already logged in:', user.uid);
        await saveUserToDatabase(user);
        window.location.href = 'dashboard.html';
      }
    });

    // Login with Popup (Better than redirect for GitHub Pages)
    loginBtn.addEventListener('click', async () => {
      console.log('Login button clicked');
      
      // Show loading
      loadingDiv.style.display = 'block';
      loginBtn.disabled = true;
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      try {
        // Sign in with popup
        const result = await signInWithPopup(auth, provider);
        console.log('Login successful:', result.user);
        
        // Save user data to database
        const saved = await saveUserToDatabase(result.user);
        
        if (saved) {
          successMsg.style.display = 'block';
          successMsg.innerHTML = '✅ Login successful! Saving your data...';
          
          // Wait a moment then redirect
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        } else {
          errorMsg.style.display = 'block';
          errorMsg.innerHTML = '⚠️ Login successful but data not saved. Please check database configuration.';
          loginBtn.disabled = false;
          loadingDiv.style.display = 'none';
        }
        
      } catch (error) {
        console.error('Login error:', error);
        loadingDiv.style.display = 'none';
        loginBtn.disabled = false;
        
        if (error.code === 'auth/unauthorized-domain') {
          errorMsg.innerHTML = `⚠️ Domain not authorized! <br> Please add this domain to Firebase Console:<br> <strong>${window.location.origin}</strong>`;
        } else if (error.code === 'auth/popup-blocked') {
          errorMsg.innerHTML = '⚠️ Popup blocked! Please allow popups for this website.';
        } else if (error.code === 'auth/network-request-failed') {
          errorMsg.innerHTML = '⚠️ Network error! Please check your internet connection.';
        } else {
          errorMsg.innerHTML = `❌ Login failed: ${error.message}`;
        }
        
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
