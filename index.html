<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - My App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #1877f2, #0c5d9e);
      color: white;
      padding: 30px;
      text-align: center;
    }
    
    .header h2 {
      font-size: 28px;
    }
    
    .content {
      padding: 30px;
      text-align: center;
    }
    
    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #1877f2;
      margin-bottom: 20px;
      object-fit: cover;
    }
    
    h3 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    
    .info-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }
    
    .info-item {
      margin: 12px 0;
      padding: 8px;
      background: white;
      border-radius: 8px;
    }
    
    .info-label {
      font-weight: bold;
      color: #555;
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
    }
    
    .info-value {
      color: #333;
      word-break: break-all;
      font-size: 14px;
    }
    
    .logout-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }
    
    .logout-btn:hover {
      background: #c0392b;
      transform: translateY(-2px);
    }
    
    .hidden {
      display: none;
    }
    
    .loading-container {
      text-align: center;
      padding: 50px;
      background: white;
      border-radius: 20px;
      max-width: 500px;
      margin: 50px auto;
    }
    
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #1877f2;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .db-status {
      font-size: 12px;
      color: #27ae60;
      margin-top: 10px;
      padding: 5px;
      background: #e8f8f5;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="loading-container" class="loading-container">
    <div class="loader"></div>
    <p>Loading your profile...</p>
    <p style="font-size: 12px; margin-top: 10px;">Please wait...</p>
  </div>
  
  <div id="dashboard" class="container hidden">
    <div class="header">
      <h2>🎯 Dashboard</h2>
      <p>Welcome back!</p>
    </div>
    <div class="content">
      <img id="profile-pic" class="profile-img" src="" alt="Profile Picture">
      <h3 id="user-name"></h3>
      
      <div class="info-card">
        <div class="info-item">
          <span class="info-label">🔑 User ID</span>
          <span class="info-value" id="user-uid"></span>
        </div>
        <div class="info-item">
          <span class="info-label">📧 Email Address</span>
          <span class="info-value" id="user-email"></span>
        </div>
        <div class="info-item">
          <span class="info-label">📅 Account Created</span>
          <span class="info-value" id="created-at"></span>
        </div>
        <div class="info-item">
          <span class="info-label">🕐 Last Login</span>
          <span class="info-value" id="last-login"></span>
        </div>
        <div class="info-item">
          <span class="info-label">🔗 Login Provider</span>
          <span class="info-value">Facebook</span>
        </div>
      </div>
      
      <div id="db-status" class="db-status"></div>
      <button id="logout-btn" class="logout-btn">🚪 Logout</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBB3RRMw0MinDO1MPd2D6Ud-QAew-1ckzY",
      authDomain: "mywebsite-852ab.firebaseapp.com",
      projectId: "mywebsite-852ab",
      storageBucket: "mywebsite-852ab.firebasestorage.app",
      messagingSenderId: "300123917348",
      appId: "1:300123917348:web:53a1c10b54a8928a8a9cb1",
      measurementId: "G-C14SR2RZWS"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loadingDiv = document.getElementById('loading-container');
    const dashboard = document.getElementById('dashboard');
    const profilePic = document.getElementById('profile-pic');
    const userName = document.getElementById('user-name');
    const userUid = document.getElementById('user-uid');
    const userEmail = document.getElementById('user-email');
    const createdAtSpan = document.getElementById('created-at');
    const lastLoginSpan = document.getElementById('last-login');
    const dbStatus = document.getElementById('db-status');
    const logoutBtn = document.getElementById('logout-btn');

    // Function to update last login time
    async function updateLastLogin(uid) {
      try {
        const userRef = doc(db, "users", uid);
        await updateDoc(userRef, {
          lastLogin: new Date().toISOString()
        });
      } catch (error) {
        console.error('Error updating last login:', error);
      }
    }

    // Function to get user data from database
    async function getUserData(uid) {
      try {
        const userRef = doc(db, "users", uid);
        const userDoc = await getDoc(userRef);
        
        if (userDoc.exists()) {
          return userDoc.data();
        } else {
          return null;
        }
      } catch (error) {
        console.error('Error getting user data:', error);
        return null;
      }
    }

    // Monitor auth state with better error handling
    onAuthStateChanged(auth, async (user) => {
      console.log("Auth state changed:", user ? "User logged in" : "No user");
      
      if (user) {
        try {
          // Update last login
          await updateLastLogin(user.uid);
          
          // Get additional data from database
          const userData = await getUserData(user.uid);
          
          // Display user data from Auth
          profilePic.src = user.photoURL || 'https://ui-avatars.com/api/?background=1877f2&color=fff&name=' + encodeURIComponent(user.displayName || 'User');
          userName.textContent = user.displayName || 'Facebook User';
          userUid.textContent = user.uid;
          userEmail.textContent = user.email || 'Not provided';
          
          // Display database info if available
          if (userData) {
            if (userData.createdAt) {
              const createdDate = new Date(userData.createdAt);
              createdAtSpan.textContent = createdDate.toLocaleString();
            } else {
              createdAtSpan.textContent = 'Just now';
            }
            
            if (userData.lastLogin) {
              const lastLoginDate = new Date(userData.lastLogin);
              lastLoginSpan.textContent = lastLoginDate.toLocaleString();
            } else {
              lastLoginSpan.textContent = new Date().toLocaleString();
            }
            
            dbStatus.textContent = '✅ Data saved in database';
            dbStatus.style.color = '#27ae60';
          } else {
            createdAtSpan.textContent = new Date().toLocaleString();
            lastLoginSpan.textContent = new Date().toLocaleString();
            dbStatus.textContent = '⚠️ Using local data only';
            dbStatus.style.color = '#f39c12';
          }
          
          // Show dashboard
          loadingDiv.classList.add('hidden');
          dashboard.classList.remove('hidden');
          
        } catch (error) {
          console.error("Error loading user data:", error);
          dbStatus.textContent = '❌ Error loading data';
          dbStatus.style.color = '#e74c3c';
          
          // Still show basic user info
          profilePic.src = user.photoURL || 'https://via.placeholder.com/100';
          userName.textContent = user.displayName || 'Facebook User';
          userUid.textContent = user.uid;
          userEmail.textContent = user.email || 'Not provided';
          createdAtSpan.textContent = 'Data unavailable';
          lastLoginSpan.textContent = 'Data unavailable';
          
          loadingDiv.classList.add('hidden');
          dashboard.classList.remove('hidden');
        }
      } else {
        // No user logged in - redirect to login
        console.log("No user found, redirecting to login");
        window.location.replace('index.html');
      }
    });

    // Logout function
    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
        console.log("User logged out");
        window.location.replace('index.html');
      } catch (error) {
        console.error('Logout error:', error);
        alert('Error logging out: ' + error.message);
      }
    });
    
    // Add a small delay to show loading (optional)
    setTimeout(() => {
      if (!dashboard.classList.contains('hidden')) {
        loadingDiv.classList.add('hidden');
      }
    }, 2000);
  </script>
</body>
</html>
