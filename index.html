<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - My App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 400px;
      width: 90%;
    }
    
    h2 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    p {
      color: #666;
      margin-bottom: 25px;
    }
    
    .facebook-btn {
      background: #1877f2;
      color: white;
      border: none;
      padding: 14px 35px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .facebook-btn:hover {
      background: #166fe5;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(24,119,242,0.3);
    }
    
    .facebook-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .error {
      color: #e74c3c;
      margin-top: 15px;
      font-size: 14px;
      display: none;
      background: #fde8e8;
      padding: 10px;
      border-radius: 8px;
    }
    
    .loading {
      display: none;
      margin-top: 15px;
      color: #666;
    }
    
    .success {
      color: #27ae60;
      margin-top: 15px;
      font-size: 14px;
      display: none;
      background: #e8f8f5;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🚀 Welcome to My App</h2>
    <p>Please login with Facebook to continue</p>
    <button class="facebook-btn" id="facebook-login-btn">
      <span>📘</span> Login with Facebook
    </button>
    <div id="error-msg" class="error"></div>
    <div id="success-msg" class="success"></div>
    <div id="loading" class="loading">Processing...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, FacebookAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBB3RRMw0MinDO1MPd2D6Ud-QAew-1ckzY",
      authDomain: "mywebsite-852ab.firebaseapp.com",
      projectId: "mywebsite-852ab",
      storageBucket: "mywebsite-852ab.firebasestorage.app",
      messagingSenderId: "300123917348",
      appId: "1:300123917348:web:53a1c10b54a8928a8a9cb1",
      measurementId: "G-C14SR2RZWS"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new FacebookAuthProvider();
    
    provider.addScope('email');
    provider.addScope('public_profile');

    const loginBtn = document.getElementById('facebook-login-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const loadingDiv = document.getElementById('loading');

    // Function to save user data to Firestore
    async function saveUserToDatabase(user) {
      if (!user) return;
      
      try {
        const userRef = doc(db, "users", user.uid);
        const userDoc = await getDoc(userRef);
        
        const userData = {
          uid: user.uid,
          name: user.displayName || 'Facebook User',
          email: user.email || '',
          photoURL: user.photoURL || '',
          provider: 'facebook',
          lastLogin: new Date().toISOString(),
          createdAt: userDoc.exists() ? userDoc.data().createdAt : new Date().toISOString(),
          status: 'active'
        };
        
        await setDoc(userRef, userData, { merge: true });
        console.log('User data saved to database');
        return true;
      } catch (error) {
        console.error('Error saving user:', error);
        return false;
      }
    }

    // Check if already logged in
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await saveUserToDatabase(user);
        window.location.replace('dashboard.html');
      }
    });

    // Handle redirect result
    getRedirectResult(auth)
      .then(async (result) => {
        if (result && result.user) {
          console.log('Login successful');
          successMsg.style.display = 'block';
          successMsg.textContent = 'Login successful! Redirecting...';
          
          // Save user data to database
          await saveUserToDatabase(result.user);
          
          setTimeout(() => {
            window.location.replace('dashboard.html');
          }, 1000);
        }
      })
      .catch((error) => {
        console.error('Error:', error);
        loadingDiv.style.display = 'none';
        
        if (error.code === 'auth/unauthorized-domain') {
          errorMsg.innerHTML = '⚠️ Domain not authorized! <br> Please add: <strong>' + window.location.origin + '</strong> to Firebase Console → Authentication → Authorized domains';
        } else if (error.code === 'auth/network-request-failed') {
          errorMsg.textContent = 'Network error. Please check your connection.';
        } else {
          errorMsg.textContent = 'Login failed: ' + error.message;
        }
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
      });

    // Login button click
    loginBtn.addEventListener('click', () => {
      loadingDiv.style.display = 'block';
      loginBtn.disabled = true;
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      signInWithRedirect(auth, provider)
        .catch((error) => {
          loadingDiv.style.display = 'none';
          loginBtn.disabled = false;
          errorMsg.textContent = 'Error: ' + error.message;
          errorMsg.style.display = 'block';
        });
    });
  </script>
</body>
</html>
